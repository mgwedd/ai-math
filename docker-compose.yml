services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aimath}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aimath_dev}
      POSTGRES_DB: ${POSTGRES_DB:-aimath}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./supabase/migrations:/migrations:ro
    ports:
      # host port 5433 to avoid clashing with a local postgres on 5432
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aimath} -d ${POSTGRES_DB:-aimath}"]
      interval: 3s
      timeout: 3s
      retries: 15

  app:
    build:
      context: .
      args:
        # local stack has no Supabase auth server -> dev identity bypass.
        # NEVER set these on a real deployment (code refuses on Vercel).
        NEXT_PUBLIC_DEV_AUTH: "1"
    restart: unless-stopped
    environment:
      DEV_AUTH: "1"
      DATABASE_URL: postgres://${POSTGRES_USER:-aimath}:${POSTGRES_PASSWORD:-aimath_dev}@db:5432/${POSTGRES_DB:-aimath}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
