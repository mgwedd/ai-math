name: CI

# Runs the Vitest curriculum smoke suite on every push to main and every PR —
# the same `npm test` the local pre-push hook runs, so CI is the backstop when
# someone pushes with --no-verify or hasn't enabled the hook.
on:
  push:
    branches: [main]
  pull_request:

# Cancel a superseded run when new commits land on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test
