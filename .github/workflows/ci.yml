name: CI

# Gates every push to main and every PR on three cheap, independent checks:
#   test              — the Vitest curriculum smoke suite (same `npm test` the
#                       local pre-push hook runs; CI is the backstop when someone
#                       pushes with --no-verify or hasn't enabled the hook).
#   build             — `next build`, which runs SWC over the whole app and
#                       catches compile/render breakage the data-layer tests
#                       can't (SWC catches what node --check won't).
#   conflict-markers  — fails if unresolved merge-conflict markers slip in.
#   actionlint        — lints the workflow files themselves.
#   dependency-review — (PRs only) blocks pulls that add vulnerable deps.
on:
  push:
    branches: [main]
  pull_request:

# Cancel a superseded run when new commits land on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: these jobs only read the repo.
permissions:
  contents: read

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['24']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: build (next)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      # No secrets needed: lib/db.js falls back to a localhost DSN and the
      # Supabase client is constructed lazily (returns null on missing env), so
      # the build never touches a real service.
      - run: npm run build

  conflict-markers:
    name: no merge-conflict markers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Fail on unresolved conflict markers
        run: |
          if git grep -nE '^(<{7}|>{7})( |$)|^={7}$' -- ':!.github/workflows/ci.yml'; then
            echo "::error::Unresolved merge-conflict markers found — resolve them before merging."
            exit 1
          fi
          echo "No conflict markers."

  actionlint:
    name: lint workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run actionlint
        # Official download script from rhysd/actionlint; lints every workflow
        # in .github/workflows for syntax, expression, and shell (shellcheck) errors.
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    # Compares the PR's dependency changes against advisories; PR-only by design.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
