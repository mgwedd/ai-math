# LOCAL DOCKER ONLY — reverse proxy that makes GoTrue look like a Supabase
# auth endpoint. The Supabase JS client calls `${SUPABASE_URL}/auth/v1/*`, but
# GoTrue serves those routes at its own root (e.g. /signup, /token, /user).
# The trailing slash on both `location` and `proxy_pass` strips the /auth/v1
# prefix so `/auth/v1/signup` -> `http://auth:9999/signup`.
events {}

http {
  server {
    listen 8000;

    location /auth/v1/ {
      proxy_pass http://auth:9999/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
      return 200 'ok';
      add_header Content-Type text/plain;
    }
  }
}
