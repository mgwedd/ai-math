name: KB top-up

# The evergreen loop's scheduled maintainer job (docs/KNOWLEDGE-BASE-PLAN.md
# §8, PR 7): once a month, run the generation pipeline (kb:generate) to fill
# the question bank with fresh LLM-authored, Wolfram-verified candidates, then
# run the conservative auto-promote policy (kb:promote --auto) so concepts
# that have earned trust (>= KB_AUTO_PROMOTE_MIN_VERIFIED matching-verification
# items) go live without a manual flip. See docs/DEPLOYMENT.md "Knowledge base
# operations" for the full operator runbook.
#
# MUST NO-OP GRACEFULLY WITHOUT SECRETS: forks and this repo's own CI never
# have ANTHROPIC_API_KEY / WOLFRAM_APP_ID / DATABASE_URL configured as repo
# secrets, and this workflow must never fail because of that — the job-level
# `if:` below skips the entire job (not a failure, a skip) when any required
# secret is absent. kb-generate.mjs / kb-promote.mjs are ALSO independently
# keyless-safe (their --dry-run modes need no network/DB at all — see the
# scripts themselves and the CI `test` job), so this is defense in depth, not
# the only guard.
on:
  schedule:
    - cron: '0 6 1 * *' # 1st of each month, 06:00 UTC
  workflow_dispatch: {}

concurrency:
  group: kb-topup
  cancel-in-progress: false # never cancel a run already writing to the bank

permissions:
  contents: read

jobs:
  topup:
    name: generate + auto-promote
    runs-on: ubuntu-latest
    # Skip (not fail) when the secrets this job needs aren't configured — the
    # normal state for forks and for this repo until an operator opts in.
    if: ${{ secrets.ANTHROPIC_API_KEY != '' && secrets.WOLFRAM_APP_ID != '' && secrets.DATABASE_URL != '' }}
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      WOLFRAM_APP_ID: ${{ secrets.WOLFRAM_APP_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Generate candidates (LLM author -> schema gate -> Wolfram gate -> dedup -> verified)
        run: npm run kb:generate
      - name: Auto-promote trusted concepts (verified -> live)
        run: npm run kb:promote -- --auto
