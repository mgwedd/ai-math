# LOCAL DOCKER ONLY — single front door for the self-host stack.
#
# Two server blocks:
#
#  * :8000 (http) — the ORIGINAL internal path. Makes GoTrue look like a
#    Supabase auth endpoint for SERVER-SIDE calls that stay inside the compose
#    network (lib/auth-server.js reaches http://proxy:8000). The Supabase JS
#    client calls `${SUPABASE_URL}/auth/v1/*`, but GoTrue serves those routes at
#    its own root (e.g. /signup, /token, /user). The trailing slash on both
#    `location` and `proxy_pass` strips the /auth/v1 prefix so
#    `/auth/v1/signup` -> `http://auth:9999/signup`.
#
#  * :443 (https) — the HTTPS front door for the BROWSER. One origin
#    (https://minima.local.astrealabs.com) fronts the whole stack:
#    `/auth/v1/*` -> GoTrue, everything else -> the Next app. TLS terminates
#    here with a self-signed cert generated at container start (docker-entrypoint
#    -https.sh). A browser warning on the self-signed cert is expected — trust it
#    once. The hostname resolves to 127.0.0.1 via public DNS (no /etc/hosts edit).
events {}

http {
  # Shared auth-proxy headers (both server blocks reuse these).
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

  # --- internal http path (server-side auth calls over the compose network) ---
  server {
    listen 8000;

    location /auth/v1/ {
      proxy_pass http://auth:9999/;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
      return 200 'ok';
      add_header Content-Type text/plain;
    }
  }

  # --- https front door (browser) ---
  server {
    listen 443 ssl;
    server_name minima.local.astrealabs.com;

    ssl_certificate     /etc/nginx/certs/minima.local.astrealabs.com.crt;
    ssl_certificate_key /etc/nginx/certs/minima.local.astrealabs.com.key;

    # Same-origin /auth/v1/* -> GoTrue (X-Forwarded-Proto https so GoTrue mints
    # links with the external https origin).
    location /auth/v1/ {
      proxy_pass http://auth:9999/;
      proxy_set_header X-Forwarded-Proto https;
    }

    # Everything else -> the Next app. WebSocket-friendly (HMR / future use).
    location / {
      proxy_pass http://app:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header X-Forwarded-Proto https;
    }
  }
}
